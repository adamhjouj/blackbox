<svg xmlns="http://www.w3.org/2000/svg" width="2200" height="1120" viewBox="0 0 2200 1120" role="img" aria-labelledby="title desc">
  <title id="title">How Blackbox works</title>
  <desc id="desc">The original Blackbox architecture graph, redrawn for readability. Evidence sources feed a loopback recorder and local store. The store feeds deterministic projections, which feed the local web UI, reports, and CLI. A signed-head receipt may be written externally.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070707"/>
      <stop offset=".58" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="riskGlow" cx="80%" cy="38%" r="56%">
      <stop offset="0" stop-color="#d95454" stop-opacity=".085"/>
      <stop offset=".55" stop-color="#d95454" stop-opacity=".018"/>
      <stop offset="1" stop-color="#d95454" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#fff" stroke-opacity=".025"/>
    </pattern>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M1 1L12 7L1 13" fill="none" stroke="#8f8f8f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowMuted" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M1 1L12 7L1 13" fill="none" stroke="#626262" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>

  <rect width="2200" height="1120" rx="22" fill="url(#bg)"/>
  <rect width="2200" height="1120" rx="22" fill="url(#grid)"/>
  <rect width="2200" height="1120" rx="22" fill="url(#riskGlow)"/>
  <rect x="1" y="1" width="2198" height="1118" rx="21" fill="none" stroke="#303030" stroke-width="2"/>

  <!-- Mermaid-style subgraphs -->
  <g fill="#141414" stroke="#3f3f3f" stroke-width="2">
    <rect x="40" y="210" width="300" height="810" rx="10"/>
    <rect x="380" y="690" width="920" height="290" rx="10"/>
    <rect x="1320" y="640" width="430" height="380" rx="10"/>
    <rect x="1440" y="70" width="380" height="540" rx="10"/>
    <rect x="1840" y="150" width="320" height="800" rx="10"/>
  </g>

  <!-- Group headings -->
  <g fill="#eeeeee" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="27" font-weight="700" text-anchor="middle">
    <text x="190" y="250">Evidence sources</text>
    <text x="840" y="732">Loopback recorder · 127.0.0.1</text>
    <text x="1535" y="682">~/.blackbox</text>
    <text x="1630" y="101" font-size="25">Deterministic read-time</text>
    <text x="1630" y="131" font-size="25">projections</text>
    <text x="2000" y="192">Investigation surfaces</text>
  </g>

  <!-- Connection layer: evidence sources -->
  <g fill="none" stroke="#8f8f8f" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" marker-end="url(#arrow)">
    <path d="M305 702H350C375 702 390 804 410 820"/>
    <path d="M320 898H350C375 898 390 844 410 832"/>
    <path d="M600 830H635"/>
    <path d="M815 830H850"/>
    <path d="M1060 830H1095"/>
    <path d="M1305 817C1320 817 1330 755 1360 755"/>
    <path d="M1305 843C1325 843 1328 900 1335 900"/>
    <path d="M1545 900H1560"/>
  </g>

  <!-- Git worktree goes directly to reconciliation, matching the original graph -->
  <path d="M305 342H1370C1415 342 1425 372 1500 372" fill="none" stroke="#8f8f8f" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <!-- Store fans out to every deterministic projection -->
  <g fill="none" stroke="#767676" stroke-width="2.1" stroke-linecap="round" marker-end="url(#arrowMuted)" opacity=".9">
    <path d="M1450 755C1390 640 1390 320 1510 192"/>
    <path d="M1450 755C1405 655 1420 415 1480 282"/>
    <path d="M1450 755C1415 665 1440 515 1500 372"/>
    <path d="M1450 755C1425 675 1460 585 1480 462"/>
    <path d="M1450 755C1435 690 1470 625 1488 552"/>
  </g>

  <!-- Projections feed the investigation surfaces -->
  <g fill="none" stroke="#707070" stroke-width="2" stroke-linecap="round" marker-end="url(#arrowMuted)" opacity=".9">
    <path d="M1750 192C1800 192 1820 315 1880 315"/>
    <path d="M1780 282C1820 282 1835 330 1880 330"/>
    <path d="M1760 372C1810 372 1835 345 1880 345"/>
    <path d="M1780 462C1820 462 1840 360 1880 360"/>
    <path d="M1768 552C1820 552 1840 375 1880 375"/>
    <path d="M1780 462C1815 462 1835 585 1870 585"/>
    <path d="M1760 372C1800 372 1820 600 1870 600"/>
    <path d="M1768 552C1810 552 1835 615 1870 615"/>
  </g>

  <!-- Direct CLI verification and external receipt paths -->
  <path d="M1540 755H1895" fill="none" stroke="#8f8f8f" stroke-width="2.6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1730 900C1770 900 1800 1030 1850 1030" fill="none" stroke="#646464" stroke-width="2.4" stroke-dasharray="8 8" stroke-linecap="round" marker-end="url(#arrowMuted)"/>

  <!-- Evidence-source nodes -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#softShadow)">
    <g transform="translate(75 285)">
      <rect width="230" height="114" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="115" y="45" fill="#f2f2f2" font-size="27" font-weight="700" text-anchor="middle">Git worktree</text>
      <text x="115" y="79" fill="#a6a6a6" font-size="22" text-anchor="middle">baseline + end state</text>
    </g>
    <g transform="translate(75 650)">
      <rect width="230" height="104" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="115" y="42" fill="#f2f2f2" font-size="25" font-weight="700" text-anchor="middle">Git reference hook</text>
      <text x="115" y="75" fill="#a6a6a6" font-size="22" text-anchor="middle">ref changes</text>
    </g>
    <g transform="translate(60 838)">
      <rect width="260" height="120" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="130" y="39" fill="#f2f2f2" font-size="25" font-weight="700" text-anchor="middle">Claude Code hooks</text>
      <text x="130" y="73" fill="#a6a6a6" font-size="20" text-anchor="middle">prompts · tools · MCP</text>
      <text x="130" y="99" fill="#a6a6a6" font-size="20" text-anchor="middle">lifecycle</text>
    </g>
  </g>

  <!-- Recorder pipeline -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#softShadow)">
    <g transform="translate(410 785)">
      <rect width="190" height="90" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="95" y="40" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">Authenticated</text>
      <text x="95" y="69" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">ingest</text>
    </g>
    <g transform="translate(635 785)">
      <rect width="180" height="90" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="90" y="40" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">Normalize +</text>
      <text x="90" y="69" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">bound</text>
    </g>
    <g transform="translate(850 785)">
      <rect width="210" height="90" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="105" y="40" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">Fail-closed</text>
      <text x="105" y="69" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">redaction</text>
    </g>
    <g transform="translate(1095 785)">
      <rect width="210" height="90" rx="7" fill="#f0f0f0" stroke="#f0f0f0" stroke-width="2"/>
      <text x="105" y="40" fill="#0a0a0a" font-size="23" font-weight="750" text-anchor="middle">Append +</text>
      <text x="105" y="69" fill="#0a0a0a" font-size="23" font-weight="750" text-anchor="middle">SHA-256 chain</text>
    </g>
  </g>

  <!-- Local-store nodes -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#softShadow)">
    <g transform="translate(1360 710)">
      <path d="M0 18C0 8 40 0 90 0s90 8 90 18v56c0 10-40 18-90 18S0 84 0 74z" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <ellipse cx="90" cy="18" rx="90" ry="18" fill="#181818" stroke="#565656" stroke-width="2"/>
      <text x="90" y="59" fill="#f2f2f2" font-size="25" font-weight="700" text-anchor="middle">SQLite · WAL</text>
    </g>
    <g transform="translate(1335 850)">
      <path d="M0 18C0 8 48 0 105 0s105 8 105 18v67c0 10-48 18-105 18S0 95 0 85z" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <ellipse cx="105" cy="18" rx="105" ry="18" fill="#181818" stroke="#565656" stroke-width="2"/>
      <text x="105" y="58" fill="#f2f2f2" font-size="21" font-weight="700" text-anchor="middle">Content-addressed</text>
      <text x="105" y="86" fill="#f2f2f2" font-size="21" font-weight="700" text-anchor="middle">mutation evidence</text>
    </g>
    <g transform="translate(1560 850)">
      <rect width="170" height="103" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="85" y="37" fill="#f2f2f2" font-size="20" font-weight="700" text-anchor="middle">Ed25519 key +</text>
      <text x="85" y="67" fill="#f2f2f2" font-size="20" font-weight="700" text-anchor="middle">deletion</text>
      <text x="85" y="91" fill="#f2f2f2" font-size="20" font-weight="700" text-anchor="middle">watermark</text>
    </g>
  </g>

  <!-- Deterministic projection nodes -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#softShadow)">
    <g transform="translate(1510 155)">
      <rect width="240" height="74" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="120" y="47" fill="#f2f2f2" font-size="25" font-weight="700" text-anchor="middle">Causal DAG</text>
    </g>
    <g transform="translate(1480 245)">
      <rect width="300" height="74" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="150" y="47" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">FTS search + blast radius</text>
    </g>
    <g transform="translate(1500 335)">
      <rect width="260" height="74" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="130" y="47" fill="#f2f2f2" font-size="25" font-weight="700" text-anchor="middle">Git reconciliation</text>
    </g>
    <g transform="translate(1480 425)">
      <rect width="300" height="74" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="150" y="47" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">Session story + reasoning</text>
    </g>
    <g transform="translate(1488 515)">
      <rect width="280" height="74" rx="7" fill="#1b1010" stroke="#d95454" stroke-width="2.5"/>
      <text x="140" y="47" fill="#e99393" font-size="25" font-weight="750" text-anchor="middle">Versioned risk engine</text>
    </g>
  </g>

  <!-- Investigation surfaces -->
  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#softShadow)">
    <g transform="translate(1880 290)">
      <rect width="240" height="96" rx="7" fill="#f0f0f0" stroke="#f0f0f0" stroke-width="2"/>
      <text x="120" y="58" fill="#0a0a0a" font-size="27" font-weight="750" text-anchor="middle">Local web UI</text>
    </g>
    <g transform="translate(1870 550)">
      <rect width="270" height="96" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="135" y="41" fill="#f2f2f2" font-size="25" font-weight="700" text-anchor="middle">Markdown /</text>
      <text x="135" y="71" fill="#f2f2f2" font-size="25" font-weight="700" text-anchor="middle">forensic report</text>
    </g>
    <g transform="translate(1895 720)">
      <rect width="220" height="96" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
      <text x="110" y="41" fill="#f2f2f2" font-size="24" font-weight="700" text-anchor="middle">CLI verify</text>
      <text x="110" y="71" fill="#a6a6a6" font-size="21" text-anchor="middle">audit · file</text>
    </g>
  </g>

  <!-- External receipt -->
  <g transform="translate(1850 980)" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" filter="url(#softShadow)">
    <rect width="300" height="96" rx="7" fill="#0f0f0f" stroke="#565656" stroke-width="2"/>
    <text x="150" y="39" fill="#f2f2f2" font-size="22" font-weight="700" text-anchor="middle">External signed-head receipt</text>
    <text x="150" y="70" fill="#a6a6a6" font-size="21" text-anchor="middle">Git · file · HTTPS</text>
  </g>
</svg>
