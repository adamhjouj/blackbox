<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="560" viewBox="0 0 1600 560" role="img" aria-labelledby="title desc">
  <title id="title">Blackbox — forensic flight recorder for AI coding agents</title>
  <desc id="desc">A monochrome forensic event graph moving through a recorder into verified evidence, with one red risk finding.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070707"/>
      <stop offset="0.55" stop-color="#0b0b0b"/>
      <stop offset="1" stop-color="#111111"/>
    </linearGradient>
    <radialGradient id="glow" cx="77%" cy="50%" r="50%">
      <stop offset="0" stop-color="#d95454" stop-opacity="0.13"/>
      <stop offset="0.55" stop-color="#d95454" stop-opacity="0.025"/>
      <stop offset="1" stop-color="#d95454" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#fff" stroke-opacity="0.035"/>
    </pattern>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <clipPath id="frame"><rect x="16" y="16" width="1568" height="528" rx="28"/></clipPath>
  </defs>

  <g clip-path="url(#frame)">
    <rect x="16" y="16" width="1568" height="528" rx="28" fill="url(#bg)"/>
    <rect x="16" y="16" width="1568" height="528" rx="28" fill="url(#grid)"/>
    <rect x="16" y="16" width="1568" height="528" rx="28" fill="url(#glow)"/>
    <circle cx="1230" cy="278" r="118" fill="#d95454" opacity="0.035" filter="url(#soft)"/>

    <g transform="translate(86 78)">
      <rect width="52" height="52" rx="12" fill="#f2f2f2"/>
      <rect x="11" y="11" width="30" height="30" rx="7" fill="#0a0a0a"/>
      <circle cx="26" cy="26" r="5" fill="#f2f2f2"/>
      <path d="M26 0v10M26 42v10M0 26h10M42 26h10" stroke="#f2f2f2" stroke-width="3"/>
      <text x="72" y="19" fill="#9a9a9a" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" letter-spacing="3">LOCAL-FIRST · TAMPER-EVIDENT</text>
      <text x="72" y="52" fill="#f4f4f4" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="28" font-weight="650" letter-spacing="-0.5">BLACKBOX</text>
    </g>

    <g transform="translate(86 208)">
      <text x="0" y="0" fill="#f6f6f6" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="50" font-weight="700" letter-spacing="-2">Know what your agent did.</text>
      <text x="0" y="58" fill="#f6f6f6" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="50" font-weight="700" letter-spacing="-2">Prove what happened.</text>
      <text x="2" y="112" fill="#999" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="19">A forensic flight recorder for Claude Code and AI coding agents.</text>
    </g>

    <g transform="translate(936 98)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
      <path d="M32 177H130C164 177 164 98 202 98H292C330 98 330 177 366 177H466" fill="none" stroke="#5a5a5a" stroke-width="2"/>
      <path d="M130 177C166 177 166 264 202 264H292C328 264 328 177 366 177" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5 7"/>
      <path d="M292 98C328 98 330 42 368 42H446" fill="none" stroke="#d95454" stroke-width="2"/>

      <g transform="translate(0 149)">
        <rect width="96" height="56" rx="12" fill="#151515" stroke="#4b4b4b"/>
        <circle cx="20" cy="20" r="5" fill="#b8b8b8"/>
        <text x="34" y="24" fill="#bbb" font-size="12">PROMPT</text>
        <text x="18" y="43" fill="#696969" font-size="10">turn_042</text>
      </g>
      <g transform="translate(174 70)">
        <rect width="144" height="56" rx="12" fill="#f0f0f0"/>
        <rect x="16" y="16" width="24" height="24" rx="5" fill="#0a0a0a"/>
        <circle cx="28" cy="28" r="4" fill="#f0f0f0"/>
        <text x="52" y="25" fill="#111" font-size="12" font-weight="700">RECORDER</text>
        <text x="52" y="42" fill="#666" font-size="10">append + hash</text>
      </g>
      <g transform="translate(174 236)">
        <rect width="144" height="56" rx="12" fill="#151515" stroke="#414141"/>
        <text x="18" y="25" fill="#bbb" font-size="12">EVIDENCE</text>
        <text x="18" y="42" fill="#666" font-size="10">files · hosts · git</text>
      </g>
      <g transform="translate(340 149)">
        <rect width="144" height="56" rx="12" fill="#151515" stroke="#5b5b5b"/>
        <path d="M18 28l7 7 15-17" fill="none" stroke="#ddd" stroke-width="2.5"/>
        <text x="52" y="25" fill="#ddd" font-size="12">VERIFIED</text>
        <text x="52" y="42" fill="#6d6d6d" font-size="10">chain intact</text>
      </g>
      <g transform="translate(340 14)">
        <rect width="144" height="56" rx="12" fill="#1b1010" stroke="#d95454" stroke-opacity="0.75"/>
        <path d="M24 17l10 19H14z" fill="none" stroke="#d95454" stroke-width="2"/>
        <text x="52" y="25" fill="#e47b7b" font-size="12">RISK FOUND</text>
        <text x="52" y="42" fill="#925151" font-size="10">evidence linked</text>
      </g>
    </g>

    <g transform="translate(88 470)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="1.5">
      <text fill="#656565">CAPTURE</text><text x="95" fill="#3f3f3f">→</text>
      <text x="128" fill="#656565">REDACT</text><text x="224" fill="#3f3f3f">→</text>
      <text x="257" fill="#656565">CHAIN</text><text x="339" fill="#3f3f3f">→</text>
      <text x="372" fill="#656565">EXPLAIN</text><text x="472" fill="#3f3f3f">→</text>
      <text x="505" fill="#b76a6a">INVESTIGATE</text>
    </g>
  </g>
  <rect x="16.5" y="16.5" width="1567" height="527" rx="27.5" fill="none" stroke="#303030"/>
</svg>
