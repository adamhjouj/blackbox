name: Bug report
description: Report a reproducible Blackbox problem using synthetic data
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "Do not attach real databases, prompts, signing keys, or credentials. Security vulnerabilities belong in a private GitHub Security Advisory."
  - type: input
    id: version
    attributes:
      label: Blackbox version
      placeholder: 0.1.0-beta.1
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [macOS, Linux, Windows, Other]
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js and Claude Code versions
      placeholder: Node 22.14.0; Claude Code 2.1.119
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: blackbox doctor output
      description: Remove local paths or identifiers before pasting.
      render: text
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Provide minimal steps using npm run demo or synthetic data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected and actual behavior
    validations:
      required: true
